<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BARBERPRO | Novo Agendamento</title>
  <link rel="stylesheet" href="./css/novo-agendamento.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <a href="./dashboard-cliente.html" class="back-link">← Voltar</a>
      <h1>Novo Agendamento</h1>

      <form id="appointment-form">
        <label for="service_id">Serviço</label>
        <select id="service_id" required></select>

        <label for="barbeiro_id">Barbeiro</label>
        <select id="barbeiro_id"></select>

        <label for="data">Data</label>
        <input type="date" id="data" required />

        <label for="hora">Hora</label>
        <input type="time" id="hora" required />

        <label for="observacoes">Observações</label>
        <textarea id="observacoes" rows="4"></textarea>

        <button type="submit">Salvar agendamento</button>
      </form>

      <p id="feedback" class="feedback"></p>
    </div>
  </div>

  <script src="./js/auth.js"></script>
  <script src="./js/novo-agendamento.js"></script>
</body>
</html>
