<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberPro | Dashboard Cliente</title>
  <link rel="stylesheet" href="./css/dashboard-cliente.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>BarberPro</h1>
      <p id="user-info"></p>

      <nav>
        <a class="nav-btn active" href="./dashboard-cliente.html">Meus agendamentos</a>
        <a class="nav-btn" href="./novo-agendamento.html">Novo agendamento</a>
      </nav>

      <button id="logout-btn" class="btn-danger">Sair</button>
    </aside>

    <main class="content">
      <header class="topbar">
        <h2>Meus Agendamentos</h2>
      </header>

      <section class="panel">
        <div class="panel-header">
          <div class="filter-group">
            <div>
              <label for="view-filter">Visualização</label>
              <select id="view-filter">
                <option value="ativos">Agendamentos ativos</option>
                <option value="historico">Histórico</option>
              </select>
            </div>

            <div>
              <label for="status-filter">Filtrar por status</label>
              <select id="status-filter">
                <option value="">Todos</option>
                <option value="pendente">Pendente</option>
                <option value="confirmado">Confirmado</option>
                <option value="concluido">Concluído</option>
              </select>
            </div>

            <div>
              <label for="search-filter">Buscar</label>
              <input
                type="text"
                id="search-filter"
                placeholder="Buscar por serviço, barbeiro ou status"
              />
            </div>
          </div>
        </div>

        <p id="feedback" class="feedback"></p>
        <div id="appointments-list" class="cards"></div>
      </section>
    </main>
  </div>

  <script src="./js/auth.js"></script>
  <script src="./js/dashboard-cliente.js"></script>
</body>
</html>
