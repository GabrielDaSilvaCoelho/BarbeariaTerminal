<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberPro | Serviços</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/novo-servico.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>BARBERPRO</h1>
      <p id="user-info"></p>

      <nav>
        <a class="nav-btn" href="./dashboard-admin.html">Dashboard</a>
        <a class="nav-btn active" href="./novo-servico.html">Serviços</a>
      </nav>

      <button id="logout-btn" class="btn-danger">Sair</button>
    </aside>

    <main class="content">
      <header class="topbar">
        <h2>Gerenciar Serviços</h2>
      </header>

      <section class="panel">
        <form id="service-form">
          <input type="hidden" id="service-id" />

          <div class="field">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required />
          </div>

          <div class="field">
            <label for="descricao">Descrição</label>
            <textarea id="descricao"></textarea>
          </div>

          <div class="grid">
            <div class="field">
              <label for="preco">Preço</label>
              <input type="number" id="preco" step="0.01" required />
            </div>

            <div class="field">
              <label for="duracao_min">Duração (min)</label>
              <input type="number" id="duracao_min" required />
            </div>
          </div>

          <button type="submit" class="btn-primary" id="save-btn">
            Salvar serviço
          </button>
        </form>

        <p id="feedback" class="feedback"></p>

        <hr />

        <h3>Serviços cadastrados</h3>
        <div id="services-list" class="cards"></div>
      </section>
    </main>
  </div>

  <script src="./js/auth.js"></script>
  <script src="./js/novo-servico.js"></script>
</body>
</html>
