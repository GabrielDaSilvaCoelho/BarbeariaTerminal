services:
  db:
    image: postgres:15-alpine
    container_name: barberpro-db
    environment:
      POSTGRES_DB: barberpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barberpro || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    container_name: barberpro-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: barberpro
      DB_USER: postgres
      DB_PASSWORD: 1234
      JWT_SECRET: jwt-key
      JWT_EXPIRES_IN: 7d
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: barberpro-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: barberpro-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

volumes:
  pgdata: